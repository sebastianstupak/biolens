name: CD - Documentation
on:
  workflow_run:
    workflows: ["Build and Test"]
    types:
      - completed
    branches:
      - main

jobs:
  build:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Rust
        uses: actions-rs/toolchain@v1
        with:
          profile: minimal
          toolchain: stable

      - name: Generate Rust docs
        run: cargo doc --no-deps

      - uses: actions/setup-node@v3
        with:
          node-version: 18
          cache: yarn
          cache-dependency-path: web-docs/yarn.lock

      - name: Install dependencies
        run: cd web-docs && yarn install

      - name: Copy Rust docs
        run: |
          mkdir -p web-docs/static/rustdoc
          cp -r target/doc/* web-docs/static/rustdoc/

      - name: Build website
        run: cd web-docs && yarn build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./web-docs/build
