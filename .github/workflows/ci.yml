name: CI - Build & Test
run-name: CI - Build & Test (#${{ github.run_number }} - ${{ github.event.head_commit.message }})

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
jobs:
  checkmate:
    name: Cargo Checkmate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Rust
        run: |
          rustup toolchain install stable --profile minimal
          rustup override set stable
          rustup component add rustfmt clippy

      - name: Cargo cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Install cargo-checkmate
        run: cargo install --locked cargo-checkmate

      - name: Run cargo checkmate
        run: cargo checkmate

      - name: Install cargo-tarpaulin for code coverage
        run: cargo install cargo-tarpaulin --version 0.22.0

      - name: Generate code coverage
        run: cargo tarpaulin --workspace --features visualization --out Xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          file: ./cobertura.xml
          fail_ci_if_error: false

  build:
    name: Build Binaries
    needs: checkmate
    if: success()
    uses: ./.github/workflows/ci-build.yml
    with:
      build_visualization: true
      upload_artifacts: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    secrets: inherit
